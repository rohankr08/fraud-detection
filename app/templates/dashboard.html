<!DOCTYPE html>
<html>
<head>
<title>SecureFlow Control Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #0f2027;
    color: white;
    font-family: 'Segoe UI';
}

.btn-nav {
    margin: 5px;
}

.section {
    display: none;
}
</style>
</head>

<body>

<div class="container mt-4">

<h2 class="text-center mb-4">🚀 SecureFlow Control Panel</h2>

<!-- NAV BUTTONS -->
<div class="text-center mb-4">
    <button class="btn btn-info btn-nav" onclick="showSection('stats')">Stats</button>
    <button class="btn btn-warning btn-nav" onclick="showSection('charts')">Charts</button>
    <button class="btn btn-success btn-nav" onclick="showSection('table')">Transactions</button>
</div>

<!-- STATS -->
<div id="stats" class="section text-center">
    <h4>Total: {{ total }}</h4>
    <h4 class="text-danger">Fraud: {{ fraud }}</h4>
    <h4 class="text-success">Genuine: {{ genuine }}</h4>
</div>

<!-- CHARTS -->
<div id="charts" class="section">
    <canvas id="chart1"></canvas>
</div>

<!-- TABLE -->
<div id="table" class="section">

<table class="table table-dark table-striped">
<tr>
<th>ID</th>
<th>Amount</th>
<th>Time</th>
<th>Result</th>
<th>Risk</th>
<th>Reason</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}%</td>
<td>{{ row[5] }}</td>
</tr>
{% endfor %}

</table>

</div>

</div>

<script>

// toggle sections
function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

// default
showSection('stats');

// chart
new Chart(document.getElementById('chart1'), {
    type: 'pie',
    data: {
        labels: ['Fraud', 'Genuine'],
        datasets: [{
            data: [{{ fraud }}, {{ genuine }}],
        }]
    }
});

</script>

</body>
</html>
